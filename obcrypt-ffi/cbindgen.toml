# Regenerate the committed header with:
#   cbindgen --config cbindgen.toml --output include/obcrypt.h
# (https://github.com/mozilla/cbindgen). The header in include/ is
# the canonical ABI surface consumers bind against; keep it in sync.
language = "C"
include_guard = "OBCRYPT_H"
cpp_compat = true
style = "type"
autogen_warning = "/* Generated by cbindgen — do not edit by hand. */"

[parse]
parse_deps = false

[export]
prefix = ""
