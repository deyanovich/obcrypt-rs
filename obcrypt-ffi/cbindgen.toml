# Regenerate the committed header with:
#   cbindgen --config cbindgen.toml --output include/obcrypt.h
# (https://github.com/mozilla/cbindgen). The header in include/ is
# the canonical ABI surface consumers bind against, and it is the
# verbatim output of this config — CI regenerates it and fails on any
# diff, so do not hand-edit include/obcrypt.h.
#
# Pin cbindgen to 0.29.x so local regen matches the CI drift check
# (different cbindgen versions format output differently).
language = "C"
include_guard = "OBCRYPT_H"
cpp_compat = true
style = "type"
# Map Rust `usize` to `size_t` (not `uintptr_t`) so buffer-length
# parameters read idiomatically and match the documented contract.
usize_is_size_t = true
# Emit only the includes the surface needs (size_t, the fixed-width
# ints), suppressing cbindgen's default stdarg/stdbool/stdlib set.
no_includes = true
sys_includes = ["stddef.h", "stdint.h"]

# Banner emitted verbatim at the top of the header (before the include
# guard). Carries the regen instructions and the ABI contract summary.
header = """
/* obcrypt C ABI — committed reference header.
 *
 * Generated by cbindgen from the Rust source — do not edit by hand.
 * Regenerate with:
 *   cbindgen --config cbindgen.toml --output include/obcrypt.h
 *
 * The binary counterpart to oboron's C ABI: where oboron passes
 * NUL-terminated strings, obcrypt passes (ptr, len) byte buffers,
 * so payloads may contain NUL, 0xFF, anything.
 *
 * Contract (see src/lib.rs for the full text):
 *  - Input buffers are (const uint8_t *ptr, size_t len); a null ptr
 *    is allowed only when len == 0.
 *  - `scheme` is a name string ("psiv", "dsiv", …), NUL-terminated.
 *    The *_hex_key entry points additionally take the key as a
 *    NUL-terminated 128-char hex string `key_hex`.
 *  - Each output buffer is heap-allocated and owned by the caller,
 *    who MUST release it with obcrypt_buffer_free(ptr, len), passing
 *    back the same (ptr, len). Never libc free.
 *  - Return is a status code: 0 = OBCRYPT_OK, < 0 = FFI-layer fault,
 *    > 0 = obcrypt error. On any nonzero return do NOT read *out;
 *    fetch a message with obcrypt_last_error().
 *  - OBCRYPT_ABI_VERSION marks the C ABI generation; it bumps only on
 *    an incompatible change to this surface, never on an ordinary
 *    release.
 */"""

[parse]
parse_deps = false

[export]
prefix = ""
